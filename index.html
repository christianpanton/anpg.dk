<!DOCTYPE html>
<html>
<head>
	<title>ANPG | Automatisk Nummerpladegenkendelse</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<link rel="stylesheet" href="leaflet.css" />
	<meta charset="utf-8">
	<script src="app.js"></script>
	<style>
		body {
			padding: 0;
			margin: 0;
			font-family: Helvetica, sans-serif;
		}
		html, body, #map {
			height: 100%;
		}
	</style>
	</head>
	<body>
	
	<div id="map">
	</div>

	<script>

		var layer = L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}' + (L.Browser.retina ? '@2x.png' : '.png'), {
			attribution:'&copy; <a href="http://www.openstreetmap.org/copyright">OpenStreetMap</a>, &copy; <a href="https://carto.com/attributions">CARTO</a>',
			subdomains: 'abcd',
			maxZoom: 20,
			minZoom: 0
		});

		var map = new L.Map("map", {
		    center: new L.LatLng(56, 10),
		    zoom: 7
		});
		map.addLayer(layer);
		
		var icon_rp = L.MakiMarkers.icon({icon: "police", color: "#f00", size: "m"});
		var icon_rp_notactive = L.MakiMarkers.icon({icon: "police", color: "#666", size: "s"});

		var icon_miljo = L.MakiMarkers.icon({icon: "park", color: "#cf0", size: "m"});
		var icon_miljo_notactive = L.MakiMarkers.icon({icon: "park", color: "#666", size: "s"});

		var icon_ssc = L.MakiMarkers.icon({icon: "racetrack", color: "#FDDA0D", size: "m"});
		var icon_ssc_notactive = L.MakiMarkers.icon({icon: "racetrack", color: "#666", size: "s"});

		var icon_wim = L.MakiMarkers.icon({icon: "road-accident", color: "#00B8E1", size: "m"});
		var icon_wim_notactive = L.MakiMarkers.icon({icon: "road-accident", color: "#666", size: "s"});

		var icon_unknown = L.MakiMarkers.icon({icon: "star", color: "#666", size: "s"});

		$.getJSON("data.json?" + (new Date).getTime(), function(data){
			for(var i = 0; i < data.elements.length; i++){
				var el = data.elements[i];
				if(el.tags.operator == "Rigspolitiet"){
					if(el.tags.active == "no"){
						new L.marker([el.lat, el.lon], {icon: icon_rp_notactive, title: "Rigspolitiets ANPG (ikke aktivt)"}).addTo(map);
					}else{
						new L.marker([el.lat, el.lon], {icon: icon_rp, title: "Rigspolitiets ANPG"}).addTo(map);
					}
				}
				else if(el.tags.description !== undefined && el.tags.description.toLowerCase().includes("section speed control")){
					if(el.tags.active == "no"){
						new L.marker([el.lat, el.lon], {icon: icon_ssc_notactive, title: "Strækningskontrol (ikke aktivt)"}).addTo(map);
					}else{
						new L.marker([el.lat, el.lon], {icon: icon_ssc, title: "Strækningskontrol"}).addTo(map);
					}
				
				}
				else if(el.tags.operator == "Sund & Bælt"){
					if(el.tags.active == "no"){
						new L.marker([el.lat, el.lon], {icon: icon_miljo_notactive, title: "Sund & Bælt Holding ANPR (miljøzone, ikke aktivt)"}).addTo(map);
					}else{
						new L.marker([el.lat, el.lon], {icon: icon_miljo, title: "Sund & Bælt Holding ANPR (miljøzone)"}).addTo(map);
					}
				
				}
				else if(el.tags.operator == "Vejdirektoratet" && el.tags.description.toLowerCase().includes("weigh-in-motion")){
					if(el.tags.active == "no"){
						new L.marker([el.lat, el.lon], {icon: icon_wim_notactive, title: "Vejdirektoratet ANPR (Weigh-in-Motion, ikke aktivt)"}).addTo(map);
					}else{
						new L.marker([el.lat, el.lon], {icon: icon_wim, title: "Vejdirektoratet ANPR (Weigh-in-Motion)"}).addTo(map);
					}
				
				}else{
					new L.marker([el.lat, el.lon], {icon: icon_unknown, title: "Ikke kategoriseret"}).addTo(map);
				}
				
			}
		});
	</script>
</body>
</html>
