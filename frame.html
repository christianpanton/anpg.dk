<!DOCTYPE html>
<html>
<head>
	<title>ANPG | Automatisk Nummerpladegenkendelse</title>
	<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
	<link rel="stylesheet" href="leaflet.css" />
	<meta charset="utf-8">
	<script src="app.js"></script>
	<style>
		body {
			padding: 0;
			margin: 0;
			font-family: Helvetica, sans-serif;
		}
		html, body, #map {
			height: 100%;
		}


	</style>
</head>
<body>
	<div id="map"></div>

	<script>
		var layer = new L.StamenTileLayer("toner");
		layer.setUrl("https://stamen-tiles.a.ssl.fastly.net/toner/{z}/{x}/{y}.png");
		var map = new L.Map("map", {
		    center: new L.LatLng(56, 10),
		    zoom: 6
		});
		map.addLayer(layer);	
		var icon = L.MakiMarkers.icon({icon: "police", color: "#f00", size: "m"});
		$.getJSON("data.json", function(data){
			for(var i = 0; i < data.elements.length; i++){
				var el = data.elements[i];
				marker = new L.marker([el.lat, el.lon], {icon: icon}).addTo(map);
			}
		});
	</script>
</body>
</html>
